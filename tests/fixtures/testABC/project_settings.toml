# Generated by setup_missalign_project.py. Empty strings use automatic defaults.
[project]
data_dir = "/example/data/reconst_64x_Vero_02_NSs_for_PEET"
out_dir = "/example/user/tomos/maerit_test/working_scripts_v5_affine/testABC"
basename = "64x_Vero_02"

[paths]
helpers_dir = "/example/user/tomos/maerit_test/working_scripts_v5_affine/scripts"
missalign_environment = "/example/user/software/envs/missalign"

[external_tools]
# auto: load the IMOD module only when an IMOD executable is not already available.
# always: require module load to succeed. never: do not use Environment Modules.
module_mode = "auto"
imod_module = "imod"
# Usually empty. Set only when the cluster does not initialise the module command automatically.
module_init_script = ""

[input]
imod_dir = ""
conditions = ["raw_xf_affine_fixed"]
raw_stack = "/example/data/reconst_64x_Vero_02_NSs_for_PEET/64x_Vero_02.mrc"
aligned_stack = "/example/data/reconst_64x_Vero_02_NSs_for_PEET/64x_Vero_02_ali.mrc"
reconstruction_stack = "/example/data/reconst_64x_Vero_02_NSs_for_PEET/64x_Vero_02_full_rec.mrc"
raw_tilt_file = "/example/data/reconst_64x_Vero_02_NSs_for_PEET/64x_Vero_02.rawtlt"
final_tilt_file = ""
final_xf_file = ""
tltxf_file = "/example/data/reconst_64x_Vero_02_NSs_for_PEET/64x_Vero_02.xtilt"
mdoc_file = "/example/data/20230407_RVFV_Vero_and_SW13_16hpi/64x_Vero_02.mrc.mdoc"
target_volume_xyz = ""
raw_volume_xyz = ""
aligned_volume_xyz = ""
raw_pixel_size_A = ""
aligned_pixel_size_A = ""
target_pixel_size_A = ""
raw_stack_tilts = ""
tilt_axis_angle_deg = ""

[alignment_conversion]
# Automatically create a local aligned .ali with IMOD newstack when ali_identity is requested.
generate_aligned_stack = true
aligned_stack_output = ""
movement_grid_shape = [5, 5]
affine_fit_rms_tolerance_px = 0.1
affine_fit_max_tolerance_px = 0.25

[slurm]
gpu_partition = "vds"
gpu_constraint = "V100"
nodelist = ""
smoke_time = "02:00:00"
smoke_cpus = 8
smoke_dataloaders = 1
standard_time = "7-00:00:00"
standard_cpus = 16
standard_dataloaders = 1
