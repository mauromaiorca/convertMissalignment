name: tests

on:
  push:
  pull_request:

jobs:
  portable-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and portable test dependencies
        run: python -m pip install -e '.[test]'
      - name: Check command interface
        run: |
          convertMissalignment --version
          convertMissalignment where
          convertMissalignment setup --help
          convertMissalignment input --help
      - name: Compile Python files
        run: python -m compileall -q .
      - name: Run portable tests
        run: >-
          pytest -q
          tests/test_python_compiles.py
          tests/test_alignment_models.py
          tests/test_project_config.py
          tests/test_v8_layout.py
          tests/test_v8_optional_smoke.py
          tests/test_v8_preprocess.py
          tests/test_cli_compatibility.py
          tests/test_portable_installation.py
