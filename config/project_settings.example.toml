[project]
basename = "TS1"
schema_version = 2
layout_version = 8

[paths]
data_root = "/absolute/path/to/etomo_project"
output_dir = "/absolute/path/to/TS1"

[input]
raw_stack = "/absolute/path/to/etomo_project/TS1.mrc"
aligned_stack = "/absolute/path/to/etomo_project/TS1_ali.mrc"
final_xf_file = "/absolute/path/to/etomo_project/TS1.xf"
final_tilt_file = "/absolute/path/to/etomo_project/TS1.tlt"
newst_com = "/absolute/path/to/etomo_project/newst.com"
tilt_com = "/absolute/path/to/etomo_project/tilt.com"

[geometry]
raw_shape_xyz = [4096, 4096, 41]
raw_pixel_size_A = 1.363
aligned_shape_xyz = [2048, 2048, 41]
aligned_pixel_size_A = 2.726
target_volume_shape_xyz = [2048, 512, 2048]
target_pixel_size_A = 2.726
tilt_axis_angle_deg = 84.5

[conversion]
initial_conditions = ["raw_xf_affine_fixed"]

[conversion.condition_modes]
raw_xf_affine_fixed = "quarter-turn-affine"

[datasets]
native_id = "2.726Apx"
native_pixel_size_A = 2.726
selected_id = "2.726Apx"

[missalignment]
refinement_mode = "standard"
result_backend = "warp_xml"

[ctf]
mode = "off"

[multiresolution]
extra_projection_binning = 1

[cluster]
profile = "maxwell"
environment = "/absolute/path/to/missalignment-environment"
module_init_script = "/usr/share/Modules/init/bash"
imod_module = "imod/5.1.11"
warp_module = "warp/2.0.39"
# Modules that provide warpylib + the MissAlignment stack. On CSSB Maxwell the warp module
# only ships the WarpTools/WarpWorker binaries; warpylib comes from these. Set [] to disable.
missalign_modules = ["cssb/rarely", "missalign"]
partition = "vds"
constraint = "V100"
cpus = 16
time = "7-00:00:00"

[cluster.reconstruction_cluster]
partition = "cssbcpu"
cpus_per_task = 16
memory = "64G"
time = "08:00:00"

[cluster.warptools_reconstruction_cluster]
partition = "vds"
constraint = "V100"
cpus_per_task = 16
memory = "128G"
time = "24:00:00"

[reconstruction]
enabled = true
backend = "imod"
snapshots = ["pre_missalign", "smoke", "full"]

[reconstruction.warptools]
enabled = true
executable = "WarpTools"
output_angpix_A = 0.0
device_list = "0"
perdevice = 1
# Block tiling for ts_reconstruct. subvolume_padding is a single ISOTROPIC XYZ padding
# factor (padded side = subvolume_size * padding * 2 = 768 px for 64/6). It is padded
# reconstruction CONTEXT, not true final-volume overlap (blocks are stride=subvolume_size,
# central crop copied directly, output overlap = 0). Padding 6 costs (6/3)^3 = 8x the
# cubic allocation of Warp's default 3; on CUDA OOM reduce --perdevice first, not padding.
subvolume_size = 64
subvolume_padding = 6          # this project requires >= 6; lower values are rejected
normalize = false              # keep --dont_normalize (test normalisation separately)

# IMOD tomogram-positioning parsed from tilt.com (OFFSET/XAXISTILT/SHIFT). Written by setup;
# override here to force a value. tilt_axis_angle_deg (detector) is a DIFFERENT quantity from
# tilt_angle_offset_deg and x_axis_tilt_deg. SHIFT is scaled by the UNBINNED IMOD pixel size.
[geometry.imod_positioning]
contract_version = 1
tilt_angle_offset_deg = -11.5      # tilt.com OFFSET   -> Warp LevelAngleY (applied once)
x_axis_tilt_deg = 1.82             # tilt.com XAXISTILT -> Warp LevelAngleX (sign from cluster oracle)
shift_x_unbinned_px = 0.0          # tilt.com SHIFT[0] -> Warp object-space X (Angstrom)
shift_z_unbinned_px = -8.1         # tilt.com SHIFT[1] -> Warp object-space Z/thickness (Angstrom)
unbinned_pixel_size_A = 2.0        # required to scale SHIFT to Angstrom (example value)
thickness_unbinned_px = 1200
source_kind = "tilt.com"
# IMOD->Warp tilt-angle sign, applied ONCE to BOTH angles and OFFSET (LevelAngleY). -1 is
# the production IMOD-compatible default (Warp's ts_import normally writes sign -1). Allowed:
# -1 or +1. A sign +1 conversion/reconstruction/export is treated as stale vs -1.
imod_to_warp_tilt_angle_sign = -1

# Revised-IMOD export (source-aware round trip: original IMOD -> Warp -> MissAlignment
# -> revised IMOD). Published ONCE under exported_data/imod/<condition_id>; the run-level
# missalignment/runs/<condition_id>/export/imod path is only a compatibility symlink.
[export.imod_revision]
enabled = true
output_root = "exported_data/imod"
mode = "compose_with_original"          # H_final = DeltaH @ H_original
non_affine_policy = "fail"              # never silently export a non-representable .xf
affine_fit_rms_tolerance_px = 0.10
affine_fit_max_tolerance_px = 0.25
angle_representation = "preserve_original_decomposition"   # effective = tlt + OFFSET
global_positioning_policy = "preserve_unless_refined"      # OFFSET/XAXISTILT/SHIFT kept
shift_recovery_policy = "provenance_or_constrained_fit"
thickness_policy = "preserve_original"
write_residual_xf = true               # <series>.residual.xf is diagnostic (DeltaH) only
run_imod_reconstruction_validation = true
overwrite_source = false               # imported_data/imod is never modified

[provenance]
resolved = true
discovery = "provenance/source_inventory.json"
geometry = "provenance/geometry_manifest.json"
hashes = "provenance/source_hashes.json"
