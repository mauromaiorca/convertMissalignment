# Final stage (spec §37): similarity refinement with SOURCE-resolution final CTF
# (applied during final export, after the refined alignment exists) + half-map final recon.
[project]
name = "64x_Vero_02"
basename = "64x_Vero_02"

[paths]
data_root = "/path/to/etomo_project"
output_dir = "/path/to/output/64x_Vero_02_bin8_similarity_final_ctf"

[geometry]
raw_pixel_size_A = 1.36          # ASSERTION only; MRC header is authoritative
tilt_axis_angle_deg = 0.0

[conversion]
initial_conditions = ["ali_identity"]

[multiresolution]
enabled = true
extra_projection_binning = 8
aligned_generation = "reduce_existing_aligned"
restore_target = "source"

[ctf]
mode = "final"                   # final CTF deferred to post-refinement export

[reconstruction.working]
enabled = true
execution = "slurm"
halfmaps = false
required_by_missalignment = false

[missalignment]
refinement_mode = "similarity"
training_devices = "0"
reconstruction_devices = "0"
dataloaders_per_trainer = 1

[missalignment.constrained]
translation_scope = "per_tilt"
rotation_scope = "per_tilt"
scale_scope = "global"

[missalignment.constrained.gauge]
translation = "zero_tilt_recenter"
rotation = "zero_tilt_fixed"
scale = "shared_global"

[missalignment.constrained.regularization]
rotation_prior = 1.0e-4
rotation_second_difference = 1.0e-3
log_scale_prior = 1.0e-3

[reconstruction.final]
enabled = true
execution = "slurm"
halfmaps = true
half_split_mode = "angle"

[cluster]
profile = "maxwell"
generate_slurm = true
submit = false
